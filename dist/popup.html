<!DOCTYPE html>
<html>

<head>
  <title>LLM Orchestrator</title>
  <script type="module" crossorigin src="/popup.js"></script>
  <link rel="stylesheet" crossorigin href="/popup.css">
</head>

<body>
  <div class="container">
    <h2>LLM Orchestrator</h2>
    <p>Export Gemini or ChatGPT history.</p>
    <button id="saveBtn">Save as Markdown</button>
    <button id="copyBtn" style="margin-top: 5px;">Copy to Clipboard</button>
    <div style="margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 5px;">
      <input type="checkbox" id="autoCopyToggle">
      <label for="autoCopyToggle" style="font-size: 13px; user-select: none;">Auto-Copy New Responses</label>
    </div>

    <!-- Brainstorm Section -->
    <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
    <h3 style="margin: 0 0 10px; font-size: 14px;">Brainstorm Loop</h3>

    <label for="topicInput" style="display:block; text-align: left; font-size: 12px; margin-bottom: 5px;">Topic:</label>
    <input type="text" id="topicInput" placeholder="e.g. Future of AI"
      style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 5px;">

    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
      <div style="flex: 1;">
        <label style="font-size: 12px;">Rounds:</label>
        <input type="number" id="roundsInput" value="3" min="1" max="10" style="width: 100%; padding: 5px;">
      </div>
      <div style="flex: 2; display: flex; align-items: flex-end;">
        <button id="startBrainstormBtn" style="background-color: #007bff; width: 100%;">Start Loop</button>
        <button id="stopBrainstormBtn" style="background-color: #dc3545; width: 100%; display: none;">Stop</button>
      </div>
    </div>

    <!-- Debug Dashboard -->
    <div id="dashboard"
      style="display: flex; gap: 10px; margin-bottom: 5px; font-size: 11px; background: #333; padding: 5px; border-radius: 4px;">
      <div style="flex: 1;">Status: <span id="dashStatus" style="font-weight: bold; color: #888;">Idle</span></div>
      <div style="flex: 1;">Round: <span id="dashRound" style="font-weight: bold;">0/0</span></div>
    </div>

    <div id="status"
      style="white-space: pre-wrap; font-size: 11px; max-height: 100px; overflow-y: auto; text-align: left; background: #222; padding: 5px; border-radius: 4px; margin-top: 5px;">
    </div>
  </div>
</body>

</html>
